# Para no tener que instalar gradle en el pc, se incluye el gradle wrapper, que es un script que descarga y ejecuta la versión de gradle especificada en el proyecto. Esto permite que cualquier persona pueda compilar el proyecto sin tener que preocuparse por la versión de gradle instalada en su sistema.

distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.7-bin.zip
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists